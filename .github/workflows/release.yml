name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: write apk signing key
        run: |
          echo "$APK_SIGNING_RSA_KEY" > /tmp/ward-apk.rsa
          chmod 600 /tmp/ward-apk.rsa
        env:
          APK_SIGNING_RSA_KEY: ${{ secrets.APK_SIGNING_RSA_KEY }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          APK_KEY_FILE: /tmp/ward-apk.rsa

      - name: upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish-deb:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: push to buildkite debian registry
        run: |
          for f in dist/*.deb; do
            curl -sf -X POST \
              -H "Authorization: Bearer $BUILDKITE_PACKAGE_TOKEN" \
              -F "file=@$f" \
              "https://api.buildkite.com/v2/packages/organizations/br4zz4/registries/ward-debian/packages"
          done
        env:
          BUILDKITE_PACKAGE_TOKEN: ${{ secrets.BUILDKITE_PACKAGE_TOKEN }}

  publish-apk:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: push to buildkite alpine registry
        run: |
          for f in dist/*.apk; do
            resp=$(curl -s -w "\nHTTP:%{http_code}" -X POST \
              -H "Authorization: Bearer $BUILDKITE_PACKAGE_TOKEN" \
              -F "file=@$f" \
              "https://api.buildkite.com/v2/packages/organizations/br4zz4/registries/ward-alpine/packages")
            http_code=$(echo "$resp" | grep "HTTP:" | cut -d: -f2)
            body=$(echo "$resp" | grep -v "HTTP:")
            echo "APK upload $f → HTTP $http_code"
            if [ "$http_code" -ge 400 ]; then
              echo "Error: $body"
              exit 1
            fi
          done
        env:
          BUILDKITE_PACKAGE_TOKEN: ${{ secrets.BUILDKITE_PACKAGE_TOKEN }}
