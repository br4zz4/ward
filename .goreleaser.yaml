version: 2

project_name: ward

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c "go run ./cmd/ward completion zsh > completions/ward.zsh"
    - sh -c "go run ./cmd/ward completion bash > completions/ward.bash"
    - sh -c "go run ./cmd/ward completion fish > completions/ward.fish"

builds:
  - id: ward
    main: ./cmd/ward
    binary: ward
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: ward
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md
      - completions/

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: ward-deb
    package_name: ward
    vendor: br4zz4
    homepage: https://github.com/br4zz4/ward
    maintainer: br4zz4
    description: Hierarchical secrets management with zero external dependencies.
    license: MIT
    formats:
      - deb
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/ward/LICENSE
      - src: ./completions/ward.zsh
        dst: /usr/share/zsh/vendor-completions/_ward
      - src: ./completions/ward.bash
        dst: /usr/share/bash-completion/completions/ward
      - src: ./completions/ward.fish
        dst: /usr/share/fish/vendor_completions.d/ward.fish

  - id: ward-apk
    package_name: ward
    vendor: br4zz4
    homepage: https://github.com/br4zz4/ward
    maintainer: br4zz4
    description: Hierarchical secrets management with zero external dependencies.
    license: MIT
    formats:
      - apk
    apk:
      signature:
        key_name: ward-apk
        key_file: "{{ .Env.APK_KEY_FILE }}"
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/ward/LICENSE
      - src: ./completions/ward.zsh
        dst: /usr/share/zsh/vendor-completions/_ward
      - src: ./completions/ward.bash
        dst: /usr/share/bash-completion/completions/ward
      - src: ./completions/ward.fish
        dst: /usr/share/fish/vendor_completions.d/ward.fish

homebrew_casks:
  - name: ward
    repository:
      owner: br4zz4
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: br4zz4
      email: br4zz4@users.noreply.github.com
    directory: Casks
    homepage: https://github.com/br4zz4/ward
    description: Hierarchical secrets management with zero external dependencies.
    license: MIT
    custom_block: |
      postflight do
        system_command "/usr/bin/xattr",
                       args: ["-dr", "com.apple.quarantine", staged_path.to_s]
      end
    completions:
      zsh: completions/ward.zsh
      bash: completions/ward.bash
      fish: completions/ward.fish

release:
  github:
    owner: br4zz4
    name: ward
  draft: false
  prerelease: auto
